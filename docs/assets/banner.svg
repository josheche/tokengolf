<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="300" viewBox="0 0 1200 300">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1812"/>
      <stop offset="100%" stop-color="#23211a"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#d4a840"/>
      <stop offset="100%" stop-color="#e8c060"/>
    </linearGradient>
    <linearGradient id="rule" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3d3828" stop-opacity="0"/>
      <stop offset="15%" stop-color="#3d3828"/>
      <stop offset="85%" stop-color="#3d3828"/>
      <stop offset="100%" stop-color="#3d3828" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="300" fill="url(#bg)"/>

  <!-- ██ block accent bar (Design D — left-only, thick) -->
  <rect x="0" y="0" width="18" height="300" fill="#d4a840"/>

  <!-- Top decorative rule -->
  <rect x="100" y="50" width="1000" height="1" fill="url(#rule)"/>

  <!-- Eyebrow: flag icon -->
  <text x="600" y="100" text-anchor="middle" font-family="'Fira Code', monospace" font-size="28" fill="#6bb54a" opacity="0.9">&#9971;</text>

  <!-- Title: TOKENGOLF — all-caps, one word, enlarged T -->
  <text x="600" y="172" text-anchor="middle" font-family="'Libre Baskerville', Georgia, serif" font-weight="bold" letter-spacing="8">
    <tspan font-size="78" fill="url(#gold)">T</tspan><tspan font-size="60" fill="#e8dcc4">OKENGOLF</tspan>
  </text>

  <!-- Tagline — uppercase, wide letter-spacing -->
  <text x="600" y="214" text-anchor="middle" font-family="'Libre Franklin', 'Helvetica Neue', sans-serif" font-size="15" fill="#9a9180" letter-spacing="4" text-transform="uppercase">
    EVERY TOKEN MATTERS
  </text>

  <!-- Bottom decorative rule -->
  <rect x="100" y="240" width="1000" height="1" fill="url(#rule)"/>

  <!-- Stats detail — muted but legible -->
  <text x="600" y="270" text-anchor="middle" font-family="'Fira Code', 'Courier New', monospace" font-size="12" fill="#9a9180" opacity="0.5" letter-spacing="2">
    4 classes &#183; 60+ achievements &#183; 9 hooks &#183; zero config
  </text>
</svg>
