<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="300" viewBox="0 0 1200 300">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1812"/>
      <stop offset="100%" stop-color="#23211a"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#d4a840"/>
      <stop offset="100%" stop-color="#e8c060"/>
    </linearGradient>
    <linearGradient id="rule" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3d3828" stop-opacity="0"/>
      <stop offset="15%" stop-color="#3d3828"/>
      <stop offset="85%" stop-color="#3d3828"/>
      <stop offset="100%" stop-color="#3d3828" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="300" fill="url(#bg)"/>

  <!-- Block accent bar (left) -->
  <rect x="0" y="0" width="8" height="300" fill="#d4a840"/>

  <!-- Top decorative rule -->
  <rect x="100" y="40" width="1000" height="1" fill="url(#rule)"/>

  <!-- Flag icon -->
  <text x="600" y="110" text-anchor="middle" font-size="48" fill="#d4a840" opacity="0.9">&#9971;</text>

  <!-- Title -->
  <text x="600" y="170" text-anchor="middle" font-family="'Libre Baskerville', Georgia, serif" font-size="64" font-weight="bold" letter-spacing="6">
    <tspan fill="url(#gold)">Token</tspan><tspan fill="#e8dcc4">Golf</tspan>
  </text>

  <!-- Tagline -->
  <text x="600" y="212" text-anchor="middle" font-family="'Libre Franklin', 'Helvetica Neue', sans-serif" font-size="18" fill="#9a9180" letter-spacing="1.5">
    Every token matters
  </text>

  <!-- Bottom decorative rule -->
  <rect x="100" y="242" width="1000" height="1" fill="url(#rule)"/>

  <!-- Stats detail -->
  <text x="600" y="272" text-anchor="middle" font-family="'Fira Code', 'Courier New', monospace" font-size="13" fill="#3d3828" letter-spacing="2">
    4 classes &#183; 60+ achievements &#183; 9 hooks &#183; zero config
  </text>
</svg>
